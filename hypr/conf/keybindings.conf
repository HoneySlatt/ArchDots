###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

bind = CONTROLSHIFT, T, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, e, exec, $terminal zsh -c yazi; exit
bind = $mainMod SHIFT, e, exec, [float; size 1350 750] $terminal zsh -c yazi; exit
bind = $mainMod, V, togglefloating,
bind = $mainMod, T, exec, if hyprctl getoption general:layout | grep -q dwindle; then hyprctl keyword general:layout scrolling; else hyprctl keyword general:layout dwindle; fi
bind = $mainMod, space, exec, $menu
bind = $mainMod, P, exec, hyprpicker
bind = $mainMod, S, exec, bash -c 'pgrep -x wf-recorder && pkill -INT wf-recorder || quickshell -c hyprquickshot -n'
bind = $mainMod, W, exec, quickshell ipc -p ~/.config/quickshell/bar -n call toggleVisibility call
bind = $mainMod SHIFT, W, exec, quickshell ipc -p ~/.config/quickshell/bar -n call togglePosition call
bind = $mainMod, B, exec, zen-browser
bind = $mainMod, M, exec, cider
bind = $mainMod, D, exec, vesktop
bind = $mainMod, O, exec, obsidian

bind = $mainMod SHIFT, M, exec, kitty -e aerc
bind = $mainMod SHIFT, N, exec, jellyfinmediaplayer
bind = $mainMod SHIFT, S, exec, sunshine
bind = $mainMod, A, exec, kitty -e ani-cli --skip
bind = $mainMod SHIFT, A, exec, kitty -e ani-cli -c --skip
bind = $mainMod SHIFT, V, exec, ~/.config/hypr/scripts/protonvpn-toggle.sh
bind = $mainMod CTRL, H, exec, ~/.config/hypr/scripts/toggle-hdr.sh
bind = $mainMod, F, fullscreen, 1
bind = $mainMod, R, exec, qs ipc -c bar call togglePowerMenu call
bind = $mainMod, C, exec, kitty -e claude
bind = $mainMod SHIFT, C, exec, kitty -e sh -c 'cliphist list | fzf | cliphist decode | wl-copy'

bind = $mainMod, N, exec, kitty -e nvim
bind = $mainMod, TAB, exec, qs ipc -c overview call overview toggle
bind = ctrl alt, delete, exec, kitty -e btop


# Move focus with mainMod + HJKL
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Move windows with mainMod + Shift + HJKL
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d


# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10


# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10


# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1


# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow


# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, swayosd-client --monitor DP-2 --output-volume raise
bindel = ,XF86AudioLowerVolume, exec, swayosd-client --monitor DP-2 --output-volume lower
bindel = ,XF86AudioMute, exec, swayosd-client --monitor DP-2 --output-volume mute-toggle
bindel = ,XF86AudioMicMute, exec, swayosd-client --monitor DP-2 --input-volume mute-toggle
bindel = ,XF86MonBrightnessUp, exec, swayosd-client --monitor DP-2 --brightness raise
bindel = ,XF86MonBrightnessDown, exec, swayosd-client --monitor DP-2 --brightness lower


# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
