#####################
### LOOK AND FEEL ###
#####################

# ==================
# GENERAL LAYOUT
# ==================

general {
    gaps_in = 8
    gaps_out = 8
    border_size = 2  

    col.active_border = rgba(180,190,254,1.00) 
    col.inactive_border = rgba(35,35,50,1.00) 

    layout = dwindle
}


# ==================
# DECORATION
# ==================

decoration {
    rounding = 12

    active_opacity = 1.0
    inactive_opacity = 0.9

    shadow {
        enabled = true
        range = 30
        render_power = 5
        offset = 0 5
        color = rgba(00000070)
    }
}


# ==================
# ANIMATIONS
# ==================

animations {
    enabled = true

    animation = windowsIn, 1, 3, default
    animation = windowsOut, 1, 3, default
    animation = workspaces, 1, 5, default
    animation = windowsMove, 1, 4, default
    animation = fade, 1, 3, default
    animation = border, 1, 3, default
}

# ==================
# LAYOUTS
# ==================

dwindle {
    preserve_split = true
}

master {
    mfact = 0.5
}

scrolling {
    column_width = 0.7
    fullscreen_on_one_column = true
    follow_focus = true
    focus_fit_method = 1
    follow_min_visible = 0.0
    explicit_column_widths = 0.333, 0.5, 0.667, 1.0
}


# ==================
# MISC
# ==================

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    vrr = 1
}


# ==================
# RENDER / COLOR
# ==================

render {
    cm_auto_hdr = 2    # Use monitor EDID HDR metadata (peak luminance, gamut)
}


# ==================
# WINDOW RULES
# ==================

windowrule {
  name = windowrule-1
  float = on
  match:class = ^(xdg-desktop-portal)$
}

windowrule {
  name = windowrule-2
  float = on
  match:class = ^(org.pulseaudio.pavucontrol)$
  size = 1500 750
}

windowrule {
  name = windowrule-3
  fullscreen = on
  idle_inhibit = always
  match:class = ^(mpv)$
}

windowrule {
  name = windowrule-prismlauncher
  float = on
  match:class = ^(org\.prismlauncher\.PrismLauncher)$
}

# Steam and Games rule
xwayland {
force_zero_scaling = true
}
